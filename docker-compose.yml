version: '3.8'

services:
  # Ollama - Servidor de Modelos LLM
  ollama:
    image: ollama/ollama:latest
    container_name: agonia-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${OLLAMA_DATA_PATH:-/data/ollama}:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_MAX_LOADED_MODELS=2
    networks:
      - agonia-network

  # Frontend Customizado - Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agonia-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_OLLAMA_URL=http://ollama:11434
      - NEXT_PUBLIC_FASTAPI_URL=http://backend-fastapi:8000
    depends_on:
      - ollama
      - backend-fastapi
    networks:
      - agonia-network

  # Open WebUI - Segundo Frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: agonia-open-webui
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=AgonIA
    depends_on:
      - ollama
    networks:
      - agonia-network

  # Qdrant - Banco de Vetores para RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agonia-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ${QDRANT_DATA_PATH:-/data/qdrant}:/qdrant/storage
    networks:
      - agonia-network

  # FastAPI Backend - Backend Híbrido (Python)
  backend-fastapi:
    build:
      context: ./Backend/FastAPI
      dockerfile: Dockerfile
    container_name: agonia-backend-fastapi
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8001}:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    networks:
      - agonia-network

  # NestJS Backend - Backend Híbrido (TypeScript)
  backend-nestjs:
    build:
      context: ./Backend/NestJS
      dockerfile: Dockerfile
    container_name: agonia-backend-nestjs
    restart: unless-stopped
    ports:
      - "${NESTJS_PORT:-3001}:3001"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - agonia-network

  # Nginx - Reverse Proxy (opcional, para produção)
  nginx:
    image: nginx:alpine
    container_name: agonia-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - ollama
    networks:
      - agonia-network
    profiles:
      - production

volumes:
  openwebui_data:
    driver: local

networks:
  agonia-network:
    driver: bridge
