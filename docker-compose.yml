version: '3.8'

services:
  # Ollama - Servidor de Modelos LLM
  ollama:
    image: ollama/ollama:latest
    container_name: agonia-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - agonia-network

  # Frontend Customizado - Next.js
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agonia-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_OLLAMA_URL=http://ollama:11434
      - NEXT_PUBLIC_FASTAPI_URL=http://backend-fastapi:8000
    depends_on:
      - ollama
      - backend-fastapi
    networks:
      - agonia-network

  # Open WebUI - Segundo Frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: agonia-open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_NAME=AgonIA
    depends_on:
      - ollama
    networks:
      - agonia-network

  # Qdrant - Banco de Vetores para RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agonia-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agonia-network

  # FastAPI Backend - Backend Híbrido (Python)
  backend-fastapi:
    build:
      context: ./Backend/FastAPI
      dockerfile: Dockerfile
    container_name: agonia-backend-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    networks:
      - agonia-network

  # NestJS Backend - Backend Híbrido (TypeScript)
  backend-nestjs:
    build:
      context: ./Backend/NestJS
      dockerfile: Dockerfile
    container_name: agonia-backend-nestjs
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    networks:
      - agonia-network

  # Nginx - Reverse Proxy (opcional, para produção)
  nginx:
    image: nginx:alpine
    container_name: agonia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - ollama
    networks:
      - agonia-network
    profiles:
      - production

volumes:
  ollama_data:
    driver: local
  qdrant_data:
    driver: local
  openwebui_data:
    driver: local

networks:
  agonia-network:
    driver: bridge
